id: debug-python-001
name: "The Broken Loop"
type: coding
difficulty: beginner
estimated_time_seconds: 30

description: |
  A classic bug hides in a simple Python function.
  Fix it so all tests pass. Fast and clean wins.

task:
  code: |
    def find_max(numbers):
        max_val = 0
        for n in numbers:
            if n > max_val:
                max_val = n
        return max_val
  tests:
    - input: "[3, 1, 4, 1, 5, 9]"
      expected: 9
    - input: "[-5, -1, -3]"
      expected: -1
    - input: "[0]"
      expected: 0

constraints:
  max_tokens: 2000
  max_wall_time_seconds: 30
  max_tool_calls: 5

scoring_weights:
  accuracy: 0.6
  speed: 0.25
  cost: 0.15
  error_penalty: 0.2

hint_for_commentator: "This one has a trap for negative numbers — will the agents catch it?"
